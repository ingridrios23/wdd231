<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank You</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Chamber of Commerce</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="directory.html">Directory</a></li>
        <li><a href="join.html">Join</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h2>Thank You for Your Application</h2>
      <p>We appreciate your interest in joining the Chamber of Commerce. Here is the information you submitted:</p>
      <ul id="submitted-info">
        <!-- Aquí se mostrarán los datos enviados -->
      </ul>
      <a href="index.html">Return to Home</a>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> Chamber of Commerce | All rights reserved</p>
  </footer>

  <script>
    // Mostrar año actual en el footer
    document.getElementById('year').textContent = new Date().getFullYear();

    // Función para obtener parámetros de la URL (query string)
    function getQueryParams() {
      const params = {};
      window.location.search.substring(1).split("&").forEach(pair => {
        const [key, value] = pair.split("=");
        params[decodeURIComponent(key)] = decodeURIComponent(value || "");
      });
      return params;
    }

    const infoList = document.getElementById('submitted-info');
    const params = getQueryParams();

    // Campos a mostrar con etiquetas legibles
    const fields = [
      { key: "firstName", label: "First Name" },
      { key: "lastName", label: "Last Name" },
      { key: "email", label: "Email" },
      { key: "phone", label: "Phone Number" },
      { key: "organization", label: "Organization" },
      { key: "timestamp", label: "Submission Date & Time" }
    ];

    
    fields.forEach(field => {
      if(params[field.key]) {
        const li = document.createElement('li');
        li.textContent = `${field.label}: ${params[field.key]}`;
        infoList.appendChild(li);
      }
    });
  </script>
</body>
</html>
